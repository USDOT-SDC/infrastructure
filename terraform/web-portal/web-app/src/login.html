<!DOCTYPE html>
<html lang="en" class="h-100">

<head w3-include-html="common/head.html">
    <script src="js/includeHTML.js"></script>
</head>

<body class="d-flex flex-column h-100">

    <header w3-include-html="common/header.html"></header>

    <!-- start page content -->
    <main class="flex-shrink-0">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-6">
                    <h3 class="mt-5">Login</h3>
                    <p>
                        If you do not have a Department of Transportation email address, you will be redirected to
                        Login.gov.
                    </p>
                    <p>
                        You will be prompted to create a Login.gov account if you do not already have one.
                    </p>
                    <form class="text-center">
                        <!-- DOT button -->
                        <button type="button" class="btn btn-primary btn-block ms-4">DOT Sign in</button>

                        <!-- Login.gov button -->
                        <button type="button" class="btn btn-primary btn-block ms-4">Login.gov Sign in</button>

                        <!-- Register -->
                        <div class="text-center mt-5">
                            <p>Not a SDC Researcher? <a href="register.html">Register</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <!-- end page content -->

    <footer w3-include-html="common/footer.html" class="footer mt-auto py-3 bg-light"></footer>
    <script>includeHTML();</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
